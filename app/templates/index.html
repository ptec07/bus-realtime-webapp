<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>실시간 버스정보</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --border: #e5e7eb;
      --border-strong: #c7d2fe;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #0f766e;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    main { max-width: 1120px; margin: 0 auto; padding: 24px; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 20px; }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 36px); }
    .muted { color: var(--muted); font-size: 14px; }
    .grid { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 20px; align-items: start; }
    .card { background: var(--card); border-radius: 20px; padding: 18px; box-shadow: var(--shadow); }
    .card-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; background: var(--primary-soft); color: var(--primary); font-size: 12px; font-weight: 700; }
    label { display: block; margin-bottom: 8px; font-weight: 700; }
    input, button { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 11px 13px; font: inherit; }
    button { background: var(--primary); color: white; border: none; font-weight: 700; cursor: pointer; }
    button:hover { filter: brightness(1.03); }
    ul { list-style: none; padding: 0; margin: 12px 0 0; }
    li { border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 10px; cursor: pointer; background: #fff; }
    li:hover { background: #f8fbff; border-color: var(--border-strong); }

    .route-refresh {
      width: 42px;
      min-width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #eef2ff;
      color: var(--primary);
      border: 1px solid #c7d2fe;
      box-shadow: none;
    }
    .route-refresh:hover .route-refresh-icon { transform: rotate(180deg); }
    .route-refresh-icon { display: inline-flex; transition: transform .35s ease; font-size: 20px; line-height: 1; }

    .search-input-wrap { position: relative; }
    .search-input-wrap input { padding-right: 42px; }
    .route-query-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      min-width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 999px;
      background: #e5e7eb;
      color: #374151;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
    }
    .route-query-clear[hidden] { display: none; }

    .selected-route { margin-top: 12px; }
    .timeline-summary { margin-top: 10px; padding: 12px 14px; border-radius: 14px; background: #f8fafc; color: #1f2937; font-size: 14px; }
    .timeline-wrap { margin-top: 18px; }
    .timeline { list-style: none; margin: 0; padding: 6px 0 0 0; position: relative; }
    .timeline-item { position: relative; margin: 0; padding: 0 0 0 56px; border: none; background: transparent; cursor: pointer; }
    .timeline-item:hover { background: transparent; }
    .timeline-item-inner {
      position: relative;
      padding: 12px 14px 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fff;
      margin-bottom: 12px;
      transition: border-color .2s ease, transform .2s ease;
    }
    .timeline-item:hover .timeline-item-inner,
    .timeline-item.active .timeline-item-inner {
      border-color: #93c5fd;
      transform: translateX(2px);
    }
    .timeline-line {
      position: absolute;
      left: 24px;
      top: 0;
      bottom: -12px;
      width: 3px;
      background: linear-gradient(180deg, #bfdbfe 0%, #60a5fa 100%);
      border-radius: 999px;
    }
    .timeline-dot {
      position: absolute;
      left: 14px;
      top: 18px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #fff;
      border: 4px solid #60a5fa;
      box-shadow: 0 0 0 5px rgba(96, 165, 250, 0.18);
      z-index: 1;
    }
    .timeline-item.passed .timeline-dot { border-color: #cbd5e1; box-shadow: 0 0 0 5px rgba(203, 213, 225, 0.25); }
    .timeline-item.current .timeline-dot { border-color: #14b8a6; box-shadow: 0 0 0 6px rgba(20, 184, 166, 0.18); }
    .timeline-order { font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .timeline-station { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
    .timeline-meta { font-size: 13px; color: var(--muted); }
    .timeline-arrival { margin-top: 8px; font-size: 14px; font-weight: 700; color: #0f172a; }
    .timeline-item.passed .timeline-arrival { color: var(--muted); }
    .timeline-item.current .timeline-arrival { color: var(--success); }

    .timeline-bus-marker {
      position: relative;
      margin: -2px 0 10px 0;
      padding-left: 56px;
      min-height: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .timeline-bus-marker::before {
      content: '';
      position: absolute;
      left: 24px;
      top: -2px;
      bottom: -6px;
      width: 3px;
      background: linear-gradient(180deg, #60a5fa 0%, #1d4ed8 100%);
      border-radius: 999px;
    }
    .timeline-bus-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid #bfdbfe;
    }
    .timeline-bus-pill .bus-icon { font-size: 18px; line-height: 1; }

    .empty-state {
      margin-top: 16px;
      padding: 18px;
      border: 1px dashed #cbd5e1;
      border-radius: 16px;
      color: var(--muted);
      background: #f8fafc;
      text-align: center;
    }
    .arrival { white-space: pre-line; line-height: 1.65; min-height: 24px; }

    @media (max-width: 840px) {
      main { padding: 18px; }
      .grid { grid-template-columns: 1fr; }
      .page-header { align-items: stretch; }
    }
  </style>
</head>
<body>
<main>
  <div class="page-header">
    <div>
      <h1>실시간 버스정보 웹앱</h1>
      <p class="muted">노선번호 검색 후 정류장 타임라인과 운행 중인 버스를 함께 확인</p>
    </div>
    <button id="route-refresh" class="route-refresh" type="button" aria-label="화면 새로고침">
      <span class="route-refresh-icon">↻</span>
    </button>
  </div>

  <div class="grid">
    <section class="card">
      <label for="route-query">노선번호</label>
      <div class="search-input-wrap">
        <input id="route-query" placeholder="예: 1001" value="1001">
        <button id="route-query-clear" class="route-query-clear" type="button" aria-label="노선번호 입력 지우기">×</button>
      </div>
      <button id="route-search" type="button" style="margin-top:8px;">노선 검색</button>
      <ul id="route-results"></ul>

      <div class="selected-route muted" id="selected-route">노선을 먼저 선택해줘.</div>

      <label for="station-filter" style="margin-top:16px;">정류장 필터</label>
      <input id="station-filter" placeholder="정류장 이름 필터">
    </section>

    <section class="card">
      <div class="card-title-row">
        <div>
          <div class="badge">노선 타임라인</div>
          <div id="timeline-summary" class="timeline-summary">노선을 선택하면 타임라인이 표시돼.</div>
        </div>
      </div>
      <div class="timeline-wrap">
        <ol id="route-timeline" class="timeline"></ol>
        <div id="timeline-empty" class="empty-state">노선을 선택하면 이 영역에 세로 노선도가 그려져.</div>
      </div>
    </section>
  </div>

  <section class="card" style="margin-top:20px;">
    <div class="badge">실시간 조회</div>
    <div id="arrival-result" class="arrival" style="margin-top:12px;"></div>
  </section>
</main>
<script>
  const routeQuery = document.getElementById('route-query');
  const routeQueryClear = document.getElementById('route-query-clear');
  const routeBtn = document.getElementById('route-search');
  const routeResults = document.getElementById('route-results');
  const stationFilter = document.getElementById('station-filter');
  const selectedRoute = document.getElementById('selected-route');
  const timelineSummary = document.getElementById('timeline-summary');
  const routeTimeline = document.getElementById('route-timeline');
  const timelineEmpty = document.getElementById('timeline-empty');
  const arrivalResult = document.getElementById('arrival-result');
  const routeRefresh = document.getElementById('route-refresh');

  let currentRoute = null;
  let currentStations = [];
  let currentTimelineArrival = null;
  let currentTimelineEtaBySeq = {};
  let currentSelectedStationId = null;
  let currentLiveBuses = [];
  let currentLiveBusesLoaded = false;
  let currentRecommendationsLoaded = false;
  let currentLivePollTimer = null;
  let currentLiveRequestToken = 0;
  let currentLiveFetchInFlight = false;

  function escapeHtml(text) {
    return String(text ?? '').replace(/[&<>\"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  function clearRouteQuery() {
    routeQuery.value = '';
    updateRouteQueryClear();
    routeQuery.focus();
  }

  function updateRouteQueryClear() {
    routeQueryClear.hidden = !routeQuery.value.trim();
  }

  function normalizeStationName(name) {
    return String(name ?? '')
      .replace(/[.·,()\-]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .toLowerCase();
  }

  function findStationByLiveName(liveName) {
    const normalizedLiveName = normalizeStationName(liveName);
    if (!normalizedLiveName) return null;
    return currentStations.find((station) => {
      const normalizedStationName = normalizeStationName(station.station_name);
      return normalizedStationName.includes(normalizedLiveName) || normalizedLiveName.includes(normalizedStationName);
    }) || null;
  }

  function formatMinuteLabel(minutes) {
    if (minutes === null || minutes === undefined) return '도착시간 계산 중';
    if (minutes <= 0) return '곧 도착';
    return `${minutes}분후 도착`;
  }

  function liveDataLoadingComplete() {
    return currentLiveBusesLoaded && currentRecommendationsLoaded;
  }

  function updateTimelineSummary() {
    if (!currentStations.length) {
      timelineSummary.textContent = '노선을 선택하면 타임라인이 표시돼.';
      return;
    }

    if (currentLiveBuses.length) {
      timelineSummary.textContent = `현재 운행 중 버스 ${currentLiveBuses.length}대를 표시 중이야.`;
      return;
    }

    if (currentTimelineArrival && currentTimelineArrival.current_station_name) {
      timelineSummary.textContent = `${currentTimelineArrival.current_station_name} 기준으로 도착시간을 계산했어.`;
      return;
    }

    if (liveDataLoadingComplete()) {
      timelineSummary.textContent = '현재 실시간 차량 정보를 찾지 못했어.';
      return;
    }

    timelineSummary.textContent = `${currentStations.length}개 정류장을 먼저 표시했어. 실시간 위치는 이어서 불러오는 중이야.`;
  }

  function computeTimelineState() {
    const currentBusStationSeqs = new Set(
      currentLiveBuses
        .map((bus) => Number(bus.station_seq))
        .filter((seq) => Number.isFinite(seq) && seq > 0)
    );

    const estimatedMinutesBySeq = new Map();
    Object.entries(currentTimelineEtaBySeq || {}).forEach(([seq, eta]) => {
      const seqNumber = Number(seq);
      const etaNumber = Number(eta);
      if (!Number.isFinite(seqNumber) || !Number.isFinite(etaNumber)) return;
      estimatedMinutesBySeq.set(seqNumber, etaNumber);
    });

    return { currentBusStationSeqs, estimatedMinutesBySeq };
  }

  function stationArrivalLabel(station, timelineState) {
    const seq = Number(station.station_seq);
    if (timelineState?.currentBusStationSeqs?.has(seq)) {
      return '현재 버스 위치';
    }
    if (timelineState?.estimatedMinutesBySeq?.has(seq)) {
      return formatMinuteLabel(timelineState.estimatedMinutesBySeq.get(seq));
    }
    return liveDataLoadingComplete()
      ? '실시간 위치 확인이 끝났지만 표시할 차량이 아직 없어.'
      : '실시간 차량 위치를 찾는 중';
  }

  function stationStatusClass(station, timelineState) {
    const seq = Number(station.station_seq);
    if (timelineState?.currentBusStationSeqs?.has(seq)) return 'current';
    return '';
  }

  function renderBusMarker(station) {
    const seq = Number(station.station_seq);
    const buses = currentLiveBuses.filter((bus) => Number(bus.station_seq) === seq);
    if (!buses.length) return '';
    return `
      <div class="timeline-bus-marker">
        ${buses.map((bus) => `
          <div class="timeline-bus-pill">
            <span class="bus-icon">🚌</span>
            <span>${escapeHtml(bus.plate_no || '운행중')} · ${escapeHtml(formatMinuteLabel(bus.predict_time_min))}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderTimeline() {
    const keyword = stationFilter.value.trim();
    const filteredStations = keyword
      ? currentStations.filter((station) => station.station_name.includes(keyword))
      : currentStations;

    if (!filteredStations.length) {
      routeTimeline.innerHTML = '';
      timelineEmpty.hidden = false;
      timelineEmpty.textContent = currentStations.length
        ? '필터와 일치하는 정류장이 없어.'
        : '노선을 선택하면 이 영역에 세로 노선도가 그려져.';
      return;
    }

    const timelineState = computeTimelineState();
    routeTimeline.innerHTML = filteredStations.map((station, index) => {
      const stationClass = stationStatusClass(station, timelineState);
      const activeClass = currentSelectedStationId === String(station.station_id) ? ' active' : '';
      const lineHtml = index === filteredStations.length - 1 ? '' : '<span class="timeline-line" aria-hidden="true"></span>';
      return `
        <li class="timeline-item ${stationClass}${activeClass}" data-station-id="${station.station_id}" data-sta-order="${station.station_seq}">
          ${lineHtml}
          <span class="timeline-dot" aria-hidden="true"></span>
          <div class="timeline-item-inner">
            <div class="timeline-order">${station.station_seq}번째 정류장</div>
            <div class="timeline-station">${escapeHtml(station.station_name)}</div>
            <div class="timeline-meta">${stationClass === 'current' ? '차량이 가까운 정류장에 있어.' : '실시간 위치 기준 계산'}</div>
            <div class="timeline-arrival">${escapeHtml(stationArrivalLabel(station, timelineState))}</div>
          </div>
          ${renderBusMarker(station)}
        </li>
      `;
    }).join('');

    timelineEmpty.hidden = true;
    [...routeTimeline.querySelectorAll('.timeline-item')].forEach((item) => {
      item.addEventListener('click', () => loadArrival(item.dataset.stationId, item.dataset.staOrder));
    });
  }

  async function searchRoutes() {
    const query = routeQuery.value.trim();
    if (!query) return;
    const res = await fetch(`/api/routes?query=${encodeURIComponent(query)}`);
    const data = await res.json();
    routeResults.innerHTML = data.map((route) => `
      <li data-route-id="${route.route_id}">
        <strong>${escapeHtml(route.route_name)}</strong><br>
        <span class="muted">${escapeHtml(route.start_station)} → ${escapeHtml(route.end_station)}</span><br>
        <span class="muted">${escapeHtml(route.admin_name)}</span>
      </li>
    `).join('');
    [...routeResults.querySelectorAll('li')].forEach((li) => {
      li.onclick = () => loadStations(data.find((route) => route.route_id === li.dataset.routeId));
    });
  }

  function scheduleNextLivePoll(routeId, delayMs = 5000) {
    if (!currentRoute || currentRoute.route_id !== routeId) return;
    if (currentLivePollTimer) {
      clearTimeout(currentLivePollTimer);
    }
    if (delayMs === 1500) {
      currentLivePollTimer = setTimeout(() => fetchLiveSnapshot(routeId), 1500);
      return;
    }
    currentLivePollTimer = setTimeout(() => fetchLiveSnapshot(routeId), delayMs);
  }

  function stopLivePolling() {
    if (currentLivePollTimer) {
      clearTimeout(currentLivePollTimer);
      currentLivePollTimer = null;
    }
    currentLiveRequestToken += 1;
    currentLiveFetchInFlight = false;
  }

  async function fetchLiveSnapshot(routeId, options = {}) {
    const { foreground = false } = options;
    if (!currentRoute || currentRoute.route_id !== routeId) return;
    if (currentLiveFetchInFlight) {
      scheduleNextLivePoll(routeId, foreground ? 1500 : 5000);
      return;
    }

    if (foreground) {
      currentLiveBusesLoaded = false;
      currentRecommendationsLoaded = false;
      updateTimelineSummary();
      renderTimeline();
    }

    const requestToken = ++currentLiveRequestToken;
    currentLiveFetchInFlight = true;

    try {
      const res = await fetch(`/api/routes/${routeId}/live-snapshot`);
      if (!res.ok) {
        throw new Error(`live-snapshot ${res.status}`);
      }
      const snapshot = await res.json();
      if (!currentRoute || currentRoute.route_id !== routeId || requestToken !== currentLiveRequestToken) {
        return;
      }
      currentLiveBuses = snapshot.buses || [];
      currentTimelineEtaBySeq = snapshot.timeline_eta_by_seq || {};
      currentTimelineArrival = snapshot.recommendations?.length ? snapshot.recommendations[0].arrival : null;
      currentLiveBusesLoaded = true;
      currentRecommendationsLoaded = true;
      updateTimelineSummary();
      renderTimeline();
    } catch (error) {
      if (!currentRoute || currentRoute.route_id !== routeId || requestToken !== currentLiveRequestToken) {
        return;
      }
      currentLiveBusesLoaded = true;
      currentRecommendationsLoaded = true;
      updateTimelineSummary();
      renderTimeline();
    } finally {
      if (requestToken !== currentLiveRequestToken) {
        return;
      }
      currentLiveFetchInFlight = false;
      scheduleNextLivePoll(routeId, foreground ? 1500 : 5000);
    }
  }

  function startLivePolling(routeId, options = {}) {
    stopLivePolling();
    fetchLiveSnapshot(routeId, options);
  }

  async function loadStations(route) {
    stopLivePolling();
    currentRoute = route;
    currentSelectedStationId = null;
    currentTimelineArrival = null;
    currentTimelineEtaBySeq = {};
    currentLiveBuses = [];
    currentLiveBusesLoaded = false;
    currentRecommendationsLoaded = false;
    selectedRoute.textContent = `${route.route_name} | ${route.start_station} → ${route.end_station}`;
    const res = await fetch(`/api/routes/${route.route_id}/stations`);
    currentStations = await res.json();
    updateTimelineSummary();
    renderTimeline();

    startLivePolling(route.route_id, { foreground: true });
  }

  async function loadArrival(stationId, staOrder) {
    if (!currentRoute) return;
    currentSelectedStationId = String(stationId);
    const params = new URLSearchParams({ route_id: currentRoute.route_id, station_id: stationId, sta_order: staOrder });
    const res = await fetch(`/api/arrival?${params.toString()}`);
    const data = await res.json();
    if (!data) {
      arrivalResult.textContent = '';
      renderTimeline();
      return;
    }
    currentTimelineArrival = data;
    timelineSummary.textContent = `${data.current_station_name || '실시간 위치 확인'} 기준으로 다시 계산했어.`;
    arrivalResult.textContent = [
      `노선: ${data.route_name}`,
      `상태: ${data.flag || '-'}`,
      `예상 도착: ${formatMinuteLabel(data.predict_time_min)}`,
      `남은 정류장 수: ${data.location_no ?? '-'}`,
      `현재 차량 위치 정류장: ${data.current_station_name || '-'}`,
      `차량번호: ${data.plate_no || '-'}`,
      `잔여 좌석: ${data.remain_seat_count ?? '-'}`,
      `메시지: ${data.result_message || '-'}`,
    ].join('\n');
    renderTimeline();
  }

  routeRefresh.addEventListener('click', () => {
    if (!currentRoute) {
      searchRoutes();
      return;
    }
    fetchLiveSnapshot(currentRoute.route_id, { foreground: true });
  });
  routeQueryClear.addEventListener('click', clearRouteQuery);
  routeBtn.addEventListener('click', searchRoutes);
  stationFilter.addEventListener('input', renderTimeline);
  routeQuery.addEventListener('input', updateRouteQueryClear);
  routeQuery.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') searchRoutes();
  });

  updateRouteQueryClear();
  searchRoutes();
</script>
</body>
</html>
